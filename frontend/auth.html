<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <title>Sign In – Coderefine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./config.local.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
      min-height: 100vh;
      display: flex;
      position: relative;
      font-family: 'Sora', sans-serif;
    }

    /* Animated particle field */
    .particle-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: radial-gradient(circle, rgba(100, 200, 255, 0.8), rgba(100, 200, 255, 0));
      border-radius: 50%;
      pointer-events: none;
    }

    /* Glassmorphic orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 2;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      top: -200px;
      right: -100px;
      animation: float-slow 20s ease-in-out infinite;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: linear-gradient(135deg, #06b6d4, #0891b2);
      bottom: -100px;
      left: -100px;
      animation: float-slow 25s ease-in-out infinite reverse;
    }

    @keyframes float-slow {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(30px, -30px); }
      50% { transform: translate(-20px, 20px); }
      75% { transform: translate(20px, 10px); }
    }

    #auth-root {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      position: relative;
      z-index: 10;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 480px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 50px;
      animation: fade-in-down 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fade-in-down {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 24px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.2), rgba(124, 58, 237, 0.2));
      border: 2px solid rgba(79, 70, 229, 0.4);
      font-size: 36px;
      font-weight: 800;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      background: linear-gradient(135deg, #64b5f6, #9c27b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logo-pulse 3s ease-in-out infinite;
    }

    @keyframes logo-pulse {
      0%, 100% {
        box-shadow: 0 0 20px rgba(79, 70, 229, 0.3);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 40px rgba(79, 70, 229, 0.5);
        transform: scale(1.05);
      }
    }

    .auth-title {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .auth-subtitle {
      font-size: 14px;
      color: #cbd5e1;
      letter-spacing: 0.3px;
    }

    .auth-card {
      background: rgba(15, 20, 40, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(100, 200, 255, 0.15);
      border-radius: 20px;
      padding: 40px;
      animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      background: linear-gradient(135deg, rgba(100, 200, 255, 0.2), rgba(168, 85, 247, 0.1));
      border-radius: 20px;
      z-index: -1;
    }

    @keyframes fade-in-up {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .auth-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .auth-field label {
      font-size: 13px;
      font-weight: 600;
      color: #cbd5e1;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .auth-field input {
      padding: 12px 16px;
      background: rgba(30, 35, 55, 0.7);
      border: 1px solid rgba(100, 200, 255, 0.2);
      border-radius: 12px;
      color: #ffffff;
      font-size: 14px;
      font-family: 'Sora', sans-serif;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(10px);
    }

    .auth-field input::placeholder {
      color: #64748b;
    }

    .auth-field input:focus {
      outline: none;
      border-color: #64b5f6;
      box-shadow: 0 0 0 3px rgba(100, 200, 255, 0.1);
      background: rgba(30, 35, 55, 0.9);
    }

    .auth-submit {
      padding: 13px 24px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 10px 30px rgba(79, 70, 229, 0.3);
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      letter-spacing: 0.3px;
    }

    .auth-submit::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .auth-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(79, 70, 229, 0.5);
    }

    .auth-submit:hover:not(:disabled)::before {
      left: 100%;
    }

    .auth-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #64b5f6;
    }

    .forgot-link {
      font-size: 12px;
      color: #64b5f6;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s ease;
      font-weight: 600;
    }

    .forgot-link:hover {
      color: #a5d6ff;
      text-decoration: underline;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0;
      color: #64748b;
      font-size: 12px;
      font-weight: 500;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(100, 200, 255, 0.2), transparent);
    }

    .auth-oauth-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .auth-oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      background: rgba(30, 35, 55, 0.5);
      border: 1px solid rgba(100, 200, 255, 0.2);
      border-radius: 12px;
      color: #cbd5e1;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      font-family: 'Sora', sans-serif;
      letter-spacing: 0.3px;
    }

    .auth-oauth-btn:hover {
      background: rgba(100, 200, 255, 0.1);
      border-color: #64b5f6;
      color: #64b5f6;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(100, 200, 255, 0.15);
    }

    .auth-mode-switch {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #94a3b8;
    }

    .auth-mode-switch a {
      color: #64b5f6;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      transition: color 0.3s ease;
      letter-spacing: 0.3px;
    }

    .auth-mode-switch a:hover {
      color: #a5d6ff;
      text-decoration: underline;
    }

    .auth-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #cbd5e1;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 28px;
      transition: all 0.3s ease;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .auth-back-link:hover {
      color: #64b5f6;
      transform: translateX(-4px);
    }

    #auth-message {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 13px;
      margin-top: 20px;
      display: none;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 200, 255, 0.2);
      animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      letter-spacing: 0.3px;
    }

    @keyframes slide-in {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #auth-message.show {
      display: block;
    }

    #auth-message.error {
      background: rgba(244, 63, 94, 0.1);
      color: #ff6b7a;
      border-color: rgba(244, 63, 94, 0.3);
    }

    #auth-message.success {
      background: rgba(16, 185, 129, 0.1);
      color: #2dd4bf;
      border-color: rgba(16, 185, 129, 0.3);
    }

    #auth-signup-mode,
    #auth-forgot-mode {
      display: none;
    }

    .auth-page-title {
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 28px;
      }

      .auth-title {
        font-size: 24px;
      }

      .auth-oauth-row {
        grid-template-columns: 1fr;
      }

      .auth-logo {
        width: 70px;
        height: 70px;
        font-size: 30px;
      }
    }
  </style>
</head>

<body>
  <!-- Animated particle field -->
  <div class="particle-field" id="particleField"></div>

  <!-- Glassmorphic orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Auth Container -->
  <div id="auth-root">
    <div class="auth-container">
      <!-- Header -->
      <div class="auth-header">
        <div class="auth-logo">CR</div>
        <h1 class="auth-title">Coderefine</h1>
        <p class="auth-subtitle">AI-powered code refinement workbench</p>
      </div>

      <!-- Auth Card -->
      <div class="auth-card">
        <div id="auth-forms-container">

          <!-- LOGIN MODE -->
          <div id="auth-login-mode">
            <form id="auth-login-form" class="auth-form">
              <div class="auth-field">
                <label>Email Address</label>
                <input id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required />
              </div>
              <div class="auth-field">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                  <label>Password</label>
                  <a onclick="switchMode('forgot')" class="forgot-link">Forgot?</a>
                </div>
                <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••"
                  required />
              </div>
              <div class="checkbox-group">
                <input id="login-remember" type="checkbox" />
                <label style="cursor: pointer; margin: 0;">Remember me</label>
              </div>
              <button type="submit" class="auth-submit" id="btn-login-submit">Sign In</button>
            </form>

            <div class="auth-divider">or continue with</div>

            <div class="auth-oauth-row">
              <button type="button" class="auth-oauth-btn" id="btn-google-login">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4" />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05" />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
                </svg>
                Google
              </button>
              <button type="button" class="auth-oauth-btn" id="btn-github-login">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0">
                  <path
                    d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" />
                </svg>
                GitHub
              </button>
            </div>

            <div class="auth-mode-switch">
              Don't have an account? <a onclick="switchMode('signup')">Sign up</a>
            </div>
          </div>

          <!-- SIGNUP MODE -->
          <div id="auth-signup-mode">
            <a onclick="switchMode('login')" class="auth-back-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6" />
              </svg>
              Back to Sign In
            </a>

            <h2 class="auth-page-title">Create your account</h2>

            <form id="auth-signup-form" class="auth-form">
              <div class="auth-field">
                <label>Email Address</label>
                <input id="signup-email" type="email" autocomplete="email" placeholder="you@example.com" required />
              </div>
              <div class="auth-field">
                <label>Password</label>
                <input id="signup-password" type="password" autocomplete="new-password" placeholder="••••••••"
                  required />
              </div>
              <button type="submit" class="auth-submit" id="btn-signup-submit">Create Account</button>
            </form>

            <div class="auth-mode-switch">
              Already have an account? <a onclick="switchMode('login')">Sign in</a>
            </div>
          </div>

          <!-- FORGOT PASSWORD MODE -->
          <div id="auth-forgot-mode">
            <a onclick="switchMode('login')" class="auth-back-link">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="15 18 9 12 15 6" />
              </svg>
              Back to Sign In
            </a>

            <h2 class="auth-page-title">Reset your password</h2>

            <form id="auth-forgot-form" class="auth-form">
              <div class="auth-field">
                <label>Email Address</label>
                <input id="forgot-email" type="email" autocomplete="email" placeholder="you@example.com" required />
              </div>
              <button type="submit" class="auth-submit" id="btn-forgot-submit">Send Reset Link</button>
            </form>

            <div class="auth-mode-switch">
              Remember your password? <a onclick="switchMode('login')">Sign in</a>
            </div>
          </div>

        </div>

        <!-- Message Container -->
        <div id="auth-message" aria-live="polite"></div>
      </div>
    </div>
  </div>

  <!-- Particle animation script -->
  <script>
    // Create animated particles
    function createParticles() {
      const field = document.getElementById('particleField');
      const particleCount = 40;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.opacity = Math.random() * 0.4 + 0.1;
        particle.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite ease-in-out`;
        field.appendChild(particle);
      }

      // Add keyframe animation for particles
      const style = document.createElement('style');
      style.textContent = `
        @keyframes twinkle {
          0%, 100% { opacity: 0.1; }
          50% { opacity: 0.6; }
        }
      `;
      document.head.appendChild(style);
    }

    // Initialize particles on load
    document.addEventListener('DOMContentLoaded', () => {
      createParticles();
    });
  </script>

  <script src="./auth.js"></script>
</body>

</html>
